name: Scrapear indicadores del BCRA

on:
  schedule:
    # 09:15 hora Argentina = 12:15 UTC (Argentina no tiene horario de verano)
    - cron: '15 12 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Reservas del BCRA (API oficial)
        run: npm run reservas
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Balance Cambiario del BCRA (informe mensual HTML oficial)
        run: npm run cambiario
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        continue-on-error: true   # el informe del mes puede no estar publicado todavía
