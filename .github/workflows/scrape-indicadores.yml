name: Scrapear indicadores económicos

on:
  schedule:
    # 09:15 hora Argentina = 12:15 UTC (Argentina no tiene horario de verano)
    - cron: '15 12 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Reservas del BCRA (API oficial)
        run: npm run reservas
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Balance Cambiario del BCRA (informe mensual HTML oficial)
        run: npm run cambiario
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Riesgo país, IPC, UVA, SMVM y Canasta (Argly, server-side por CORS)
        run: npm run mercado
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Noticias Inteligentes (RSS + resumen con IA)
        run: npm run noticias
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Enviar notificaciones push (si hubo un movimiento fuerte)
        run: npm run notificaciones
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        continue-on-error: true
